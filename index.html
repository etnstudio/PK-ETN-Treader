<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro - Investment App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#0a0e1a">
</head>
<body>
    <!-- Lock Screen -->
    <div id="lockScreen">
        <div class="lock-container">
            <div class="lock-icon">🔒</div>
            <h2>App Locked</h2>
            <p>Enter PIN to unlock</p>
            <div class="pin-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="pin-pad">
                <button class="pin-btn" data-num="1">1</button>
                <button class="pin-btn" data-num="2">2</button>
                <button class="pin-btn" data-num="3">3</button>
                <button class="pin-btn" data-num="4">4</button>
                <button class="pin-btn" data-num="5">5</button>
                <button class="pin-btn" data-num="6">6</button>
                <button class="pin-btn" data-num="7">7</button>
                <button class="pin-btn" data-num="8">8</button>
                <button class="pin-btn" data-num="9">9</button>
                <button class="pin-btn" data-num="clear">⌫</button>
                <button class="pin-btn" data-num="0">0</button>
                <button class="pin-btn" data-num="enter">✓</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" style="display:none;">
        <header>
            <h1>🌟 InvestPro</h1>
            <span id="userName">Welcome, User</span>
        </header>

        <!-- Wallet Section -->
        <section class="wallet-section">
            <div class="wallet-card primary">
                <h3>💰 Main Wallet</h3>
                <p class="balance" id="mainBalance">$0.00</p>
                <div class="wallet-actions">
                    <button onclick="addBalance()">➕ Add</button>
                    <button onclick="recharge()">🔋 Recharge</button>
                </div>
            </div>
            <div class="wallet-card secondary">
                <h3>📈 Investment Wallet</h3>
                <p class="balance" id="investBalance">$0.00</p>
                <button onclick="activatePlan()">🚀 Activate Plan</button>
            </div>
        </section>

        <!-- Investment Plans -->
        <section class="plans">
            <h2>📊 Investment Plans</h2>
            <div class="plan-grid">
                <div class="plan-card" data-min="10">
                    <h4>Starter</h4>
                    <p>Min: $10</p>
                    <p>Return: 5%</p>
                    <button onclick="selectPlan(this)">Select</button>
                </div>
                <div class="plan-card" data-min="50">
                    <h4>Growth</h4>
                    <p>Min: $50</p>
                    <p>Return: 8%</p>
                    <button onclick="selectPlan(this)">Select</button>
                </div>
                <div class="plan-card" data-min="100">
                    <h4>Premium</h4>
                    <p>Min: $100</p>
                    <p>Return: 12%</p>
                    <button onclick="selectPlan(this)">Select</button>
                </div>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/investment.js"></script>
    <script src="js/lock.js"></script>
</body>
</html>
